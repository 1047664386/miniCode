services:
  postgres:
    image: postgres:16-alpine
    container_name: mci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mci
      POSTGRES_PASSWORD: mci
      POSTGRES_DB: mci
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mci"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  adminer:
    image: adminer:4
    container_name: mci-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
